<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WA Leads Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap');

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --text: #1a1a18;
    --text2: #6b6960;
    --text3: #a8a69f;
    --accent: #1a5cff;
    --accent-bg: #eef2ff;
    --green: #16a34a;
    --green-bg: #dcfce7;
    --amber: #d97706;
    --amber-bg: #fef3c7;
    --red: #dc2626;
    --red-bg: #fee2e2;
    --purple: #7c3aed;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .app-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .app-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .sync-badge {
    font-size: 11px; font-weight: 500; padding: 4px 10px;
    border-radius: 20px; background: var(--green-bg); color: var(--green);
    display: flex; align-items: center; gap: 4px;
  }
  .sync-badge.syncing { background: var(--amber-bg); color: var(--amber); }
  .sync-badge.error { background: var(--red-bg); color: var(--red); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* NAV */
  .nav {
    display: flex; background: var(--surface2);
    border-radius: 10px; padding: 3px; gap: 2px;
  }
  .nav-btn {
    flex: 1; padding: 8px; border: none; background: transparent;
    border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif;
    font-weight: 500; color: var(--text2); cursor: pointer;
    transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .nav-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .nav-btn svg { width: 15px; height: 15px; }

  /* MAIN */
  .main { padding: 16px; max-width: 480px; margin: 0 auto; }

  /* SECTION */
  .section { margin-bottom: 12px; }
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px;
    padding: 0 2px;
  }

  /* CARD */
  .card {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); overflow: hidden;
  }
  .card-body { padding: 16px; }

  /* STAFF PICKER */
  .staff-input {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 16px; font-family: 'DM Sans', sans-serif;
    background: var(--surface); color: var(--text); outline: none; transition: border .15s;
  }
  .staff-input:focus { border-color: var(--accent); }

  /* DAY PILLS */
  .day-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
  .day-row::-webkit-scrollbar { display: none; }
  .day-pill {
    flex-shrink: 0; padding: 8px 14px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--surface);
    font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    color: var(--text2); cursor: pointer; transition: all .15s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .day-pill .dp-num { font-size: 11px; color: var(--text3); font-weight: 400; }
  .day-pill.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
  .day-pill.active .dp-num { color: var(--accent); opacity: .7; }
  .day-pill.saved { border-color: var(--green); }
  .day-pill.saved .dp-num { color: var(--green); }

  /* TOTAL INPUT */
  .total-wrap { position: relative; }
  .total-input {
    width: 100%; padding: 14px 60px 14px 16px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-size: 24px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    background: var(--surface); color: var(--text); outline: none; transition: border .15s;
  }
  .total-input:focus { border-color: var(--accent); }
  .total-unit {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-size: 13px; color: var(--text3); pointer-events: none;
  }

  /* LEVEL CARDS */
  .lv-item {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .lv-item:last-child { border-bottom: none; }
  .lv-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .lv-num {
    width: 30px; height: 30px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0;
  }
  .lv-info { flex: 1; }
  .lv-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .lv-desc { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .lv-tag {
    font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px;
    background: var(--green-bg); color: var(--green); white-space: nowrap;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .lv-bottom { display: flex; align-items: center; gap: 10px; }
  .lv-bar-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .lv-bar-fill { height: 100%; border-radius: 3px; transition: width .35s ease; width: 0%; }
  .lv-pct { font-size: 13px; font-weight: 600; min-width: 38px; text-align: right; color: var(--text3); font-family: 'DM Mono', monospace; }
  .stepper { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .step-btn {
    width: 36px; height: 36px; border: none; background: var(--surface2);
    font-size: 20px; color: var(--text); cursor: pointer; font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: background .1s; line-height: 1; padding-bottom: 2px;
    -webkit-user-select: none; user-select: none;
  }
  .step-btn:active { background: var(--border); }
  .step-val {
    width: 44px; text-align: center; font-size: 16px; font-weight: 600;
    color: var(--text); border: none; background: transparent; outline: none;
    font-family: 'DM Sans', sans-serif; padding: 0;
  }

  /* METRICS */
  .metric-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .metric-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; }
  .metric-card .mc-lbl { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .metric-card .mc-val { font-size: 22px; font-weight: 600; color: var(--text); }
  .metric-card .mc-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ACTION PANEL */
  .action-panel { border-radius: var(--radius-sm); padding: 14px; }
  .action-panel.green { background: var(--green-bg); }
  .action-panel.amber { background: var(--amber-bg); }
  .action-panel.red { background: var(--red-bg); }
  .ap-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .action-panel.green .ap-title { color: var(--green); }
  .action-panel.amber .ap-title { color: var(--amber); }
  .action-panel.red .ap-title { color: var(--red); }
  .ap-body { font-size: 13px; line-height: 1.55; }
  .action-panel.green .ap-body { color: #15803d; }
  .action-panel.amber .ap-body { color: #92400e; }
  .action-panel.red .ap-body { color: #991b1b; }

  /* SAVE BUTTON */
  .save-btn {
    width: 100%; padding: 15px; border-radius: var(--radius);
    border: none; background: var(--text); color: #fff;
    font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: opacity .15s; display: flex;
    align-items: center; justify-content: center; gap: 8px;
  }
  .save-btn:active { opacity: .85; }
  .save-btn.loading { opacity: .6; pointer-events: none; }
  .save-btn svg { width: 18px; height: 18px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: #fff; padding: 10px 20px;
    border-radius: 20px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* REPORT TAB */
  .day-summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px;
  }
  .dsc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .dsc-day { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
  .dsc-staff { font-size: 14px; font-weight: 500; color: var(--text); }
  .dsc-total { font-size: 22px; font-weight: 600; color: var(--text); }
  .dsc-sub { font-size: 11px; color: var(--text3); }
  .dsc-levels { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
  .dsc-lv { display: flex; align-items: center; gap: 8px; }
  .dsc-lv-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dsc-lv-name { font-size: 12px; color: var(--text2); flex: 1; }
  .dsc-lv-bar { flex: 2; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .dsc-lv-fill { height: 100%; border-radius: 3px; }
  .dsc-lv-pct { font-size: 12px; font-weight: 600; color: var(--text); min-width: 36px; text-align: right; font-family: 'DM Mono', monospace; }
  .dsc-empty { opacity: .4; }
  .dsc-empty .dsc-total { color: var(--text3); font-size: 14px; font-weight: 400; }

  .summary-strip { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .ss-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .big-metric-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .big-metric { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px; }
  .bm-lbl { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .bm-val { font-size: 26px; font-weight: 600; color: var(--text); }
  .bm-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .export-btn {
    width: 100%; padding: 14px; border-radius: var(--radius);
    border: 1.5px solid var(--border); background: var(--surface);
    font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    color: var(--text); cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 8px; transition: background .15s;
  }
  .export-btn:active { background: var(--surface2); }
  .export-btn svg { width: 18px; height: 18px; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty-state svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: .4; }
  .empty-state p { font-size: 14px; }

  /* PROGRESS BAR */
  .progress-bar { display: flex; gap: 4px; margin-bottom: 4px; }
  .pb-seg { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background .3s; }
  .pb-seg.filled { background: var(--accent); }
  .pb-label { font-size: 11px; color: var(--text3); margin-bottom: 12px; }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="app-name">WA Leads Tracker</div>
      <div class="app-sub">WhatsApp closing journey</div>
    </div>
    <div class="sync-badge" id="sync-badge">
      <div class="sync-dot"></div>
      <span id="sync-text">Sedia</span>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="goTab('input')" id="nav-input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Input Harian
    </button>
    <button class="nav-btn" onclick="goTab('report')" id="nav-report">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Laporan 5 Hari
    </button>
  </div>
</div>

<div class="main">

  <!-- INPUT TAB -->
  <div id="pane-input">

    <div class="section">
      <div class="section-label">Nama staff</div>
      <div class="card">
        <div class="card-body">
          <input class="staff-input" type="text" id="staff" placeholder="Masukkan nama kamu..." oninput="onStaffInput()">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="progress-bar" id="prog-bar"></div>
      <div class="pb-label" id="prog-label">0 / 5 hari diisi</div>
      <div class="day-row" id="day-row"></div>
    </div>

    <div class="section">
      <div class="section-label">Total leads masuk hari ini</div>
      <div class="card">
        <div class="card-body">
          <div class="total-wrap">
            <input class="total-input" type="number" id="total" placeholder="0" min="0" oninput="recalc()">
            <span class="total-unit">leads</span>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Leads berhenti di level mana?</div>
      <div class="card" id="lv-list"></div>
    </div>

    <div class="section" id="metrics-area"></div>

    <div class="section">
      <button class="save-btn" id="save-btn" onclick="submitData()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Simpan & Hantar
      </button>
    </div>

  </div>

  <!-- REPORT TAB -->
  <div id="pane-report" style="display:none">
    <div id="report-body"></div>
    <div class="section">
      <button class="export-btn" onclick="exportCSV()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export Laporan CSV
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────────
  // Paste your Google Apps Script Web App URL here after setup
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxgFa2fD5l2zbMkOM9IB7TvNW56uC058BjJ6kkmeflshpOvgr07k7-xHPwrsa7fEx-F/exec';

  const LEVELS = [
    { key:'l1', name:'Status', desc:'Hamil / Ikhtiar hamil', color:'#7c3aed', intent:false },
    { key:'l2', name:'Problem', desc:'Masalah yang dihadapi', color:'#2563eb', intent:false },
    { key:'l3', name:'Testimoni', desc:'Bukti & kisah kejayaan', color:'#0891b2', intent:false },
    { key:'l4', name:'FAQ', desc:'Soal jawab', color:'#d97706', intent:true },
    { key:'l5', name:'Harga', desc:'Tanya harga', color:'#dc2626', intent:true },
  ];

  const DAYS = 5;
  let curDay = 0;
  let sessionData = Array.from({length:DAYS}, () => ({ staff:'', total:0, levels:[0,0,0,0,0], saved:false }));

  // ─── TAB ──────────────────────────────────────────────────────
  function goTab(t) {
    document.getElementById('pane-input').style.display = t==='input' ? 'block' : 'none';
    document.getElementById('pane-report').style.display = t==='report' ? 'block' : 'none';
    document.getElementById('nav-input').classList.toggle('active', t==='input');
    document.getElementById('nav-report').classList.toggle('active', t==='report');
    if (t === 'report') renderReport();
  }

  // ─── DAY STRIP ────────────────────────────────────────────────
  function buildDayStrip() {
    const row = document.getElementById('day-row');
    row.innerHTML = sessionData.map((d, i) => `
      <button class="day-pill${i===curDay?' active':''}${d.saved?' saved':''}" onclick="selectDay(${i})">
        <span class="dp-num">Hari ${i+1}</span>
        <span>${d.staff || '—'}</span>
      </button>`).join('');

    const filled = sessionData.filter(d => d.saved).length;
    document.getElementById('prog-bar').innerHTML = Array.from({length:DAYS}, (_,i) =>
      `<div class="pb-seg${sessionData[i].saved?' filled':''}"></div>`).join('');
    document.getElementById('prog-label').textContent = `${filled} / ${DAYS} hari diisi`;
  }

  function selectDay(i) {
    curDay = i;
    const d = sessionData[i];
    document.getElementById('staff').value = d.staff;
    document.getElementById('total').value = d.total || '';
    LEVELS.forEach((_, j) => {
      const el = document.getElementById('lv' + j);
      if (el) el.value = d.levels[j] || 0;
    });
    buildDayStrip();
    recalc();
  }

  // ─── LEVELS ───────────────────────────────────────────────────
  function buildLevels() {
    document.getElementById('lv-list').innerHTML = LEVELS.map((lv, i) => `
      <div class="lv-item">
        <div class="lv-top">
          <div class="lv-num" style="background:${lv.color}">${i+1}</div>
          <div class="lv-info">
            <div class="lv-name">${lv.name} ${lv.intent ? '<span class="lv-tag">Buying signal</span>' : ''}</div>
            <div class="lv-desc">${lv.desc}</div>
          </div>
        </div>
        <div class="lv-bottom">
          <div style="flex:1">
            <div class="lv-bar-track">
              <div class="lv-bar-fill" id="bar${i}" style="background:${lv.color}"></div>
            </div>
          </div>
          <div class="lv-pct" id="pct${i}">—</div>
          <div class="stepper">
            <button class="step-btn" ontouchstart="startHold(${i},-1)" ontouchend="stopHold()" onmousedown="startHold(${i},-1)" onmouseup="stopHold()" onmouseleave="stopHold()">−</button>
            <input class="step-val" type="number" id="lv${i}" value="0" min="0" oninput="recalc()">
            <button class="step-btn" ontouchstart="startHold(${i},1)" ontouchend="stopHold()" onmousedown="startHold(${i},1)" onmouseup="stopHold()" onmouseleave="stopHold()">+</button>
          </div>
        </div>
      </div>`).join('');
  }

  let holdTimer, holdInterval;
  function startHold(i, d) {
    doStep(i, d);
    holdTimer = setTimeout(() => {
      holdInterval = setInterval(() => doStep(i, d), 80);
    }, 400);
  }
  function stopHold() { clearTimeout(holdTimer); clearInterval(holdInterval); }
  function doStep(i, d) {
    const el = document.getElementById('lv' + i);
    el.value = Math.max(0, (+el.value || 0) + d);
    recalc();
  }

  // ─── RECALC ───────────────────────────────────────────────────
  function recalc() {
    autosave();
    const total = +document.getElementById('total').value || 0;
    const vals = LEVELS.map((_, i) => +document.getElementById('lv' + i).value || 0);

    LEVELS.forEach((lv, i) => {
      const pct = total > 0 ? (vals[i] / total * 100) : 0;
      document.getElementById('bar' + i).style.width = Math.min(pct, 100) + '%';
      const pEl = document.getElementById('pct' + i);
      pEl.textContent = total > 0 ? pct.toFixed(1) + '%' : '—';
      pEl.style.color = pct > 40 ? '#dc2626' : pct > 20 ? '#d97706' : '#16a34a';
    });

    renderMetrics(total, vals);
  }

  function renderMetrics(total, vals) {
    const area = document.getElementById('metrics-area');
    if (!total) { area.innerHTML = ''; return; }

    const intent = vals[3] + vals[4];
    const intentPct = (intent / total * 100);
    const assigned = vals.reduce((a, b) => a + b, 0);
    const uncat = Math.max(0, total - assigned);
    const l1pct = vals[0] / total * 100;

    let cls = 'amber', title = '', body = '';
    if (l1pct >= 40) {
      cls = 'red'; title = 'Perlu baiki iklan segera';
      body = `${l1pct.toFixed(0)}% leads berhenti di Level 1 (Status). Kemungkinan targeting iklan tidak tepat — leads yang masuk bukan kategori hamil/ikhtiar hamil. Semak semula audience dan creative iklan.`;
    } else if (intentPct >= 25) {
      cls = 'green'; title = 'Buying intent tinggi — follow up sekarang!';
      body = `${intentPct.toFixed(0)}% leads sampai ke FAQ/Harga. Signal pembelian yang kuat. Pastikan staff buat close offer segera.`;
    } else {
      cls = 'amber'; title = 'Semak skrip WA setiap level';
      body = `Drop-off tersebar merata. Cari level mana yang paling banyak kehilangan leads dan perbaiki skrip di bahagian tersebut.`;
    }

    area.innerHTML = `
      <div class="section-label">Ringkasan hari ini</div>
      <div class="metric-row" style="margin-bottom:10px">
        <div class="metric-card"><div class="mc-lbl">Total leads</div><div class="mc-val">${total}</div></div>
        <div class="metric-card"><div class="mc-lbl">Buying intent</div><div class="mc-val" style="color:var(--green)">${intent}</div><div class="mc-sub">${intentPct.toFixed(1)}%</div></div>
        <div class="metric-card"><div class="mc-lbl">Belum kategori</div><div class="mc-val" style="color:var(--text3)">${uncat}</div></div>
      </div>
      <div class="action-panel ${cls}">
        <div class="ap-title">${title}</div>
        <div class="ap-body">${body}</div>
      </div>`;
  }

  // ─── AUTOSAVE TO SESSION ──────────────────────────────────────
  function autosave() {
    const d = sessionData[curDay];
    d.staff = document.getElementById('staff').value;
    d.total = +document.getElementById('total').value || 0;
    d.levels = LEVELS.map((_, i) => +document.getElementById('lv' + i).value || 0);
    buildDayStrip();
  }

  function onStaffInput() { autosave(); }

  // ─── SUBMIT TO GOOGLE SHEETS ──────────────────────────────────
  async function submitData() {
    const d = sessionData[curDay];
    if (!d.staff.trim()) { showToast('Sila masukkan nama staff dulu'); return; }
    if (!d.total) { showToast('Sila masukkan jumlah leads'); return; }

    const btn = document.getElementById('save-btn');
    btn.classList.add('loading');
    btn.innerHTML = '<span>Menghantar...</span>';
    setSyncState('syncing', 'Menghantar...');

    const payload = {
      day: curDay + 1,
      staff: d.staff,
      date: new Date().toLocaleDateString('ms-MY'),
      total: d.total,
      l1: d.levels[0], l2: d.levels[1], l3: d.levels[2], l4: d.levels[3], l5: d.levels[4],
      intent: d.levels[3] + d.levels[4],
      intentPct: d.total > 0 ? ((d.levels[3] + d.levels[4]) / d.total * 100).toFixed(1) : 0,
      l1pct: d.total > 0 ? (d.levels[0] / d.total * 100).toFixed(1) : 0,
    };

    try {
      await fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      d.saved = true;
      buildDayStrip();
      setSyncState('ok', 'Tersimpan');
      showToast('✓ Data berjaya dihantar ke Sheets!');
    } catch (e) {
      setSyncState('error', 'Gagal');
      showToast('Gagal hantar — semak sambungan internet');
    }

    btn.classList.remove('loading');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Simpan & Hantar';
  }

  function setSyncState(state, text) {
    const badge = document.getElementById('sync-badge');
    badge.className = 'sync-badge' + (state !== 'ok' ? ' ' + state : '');
    document.getElementById('sync-text').textContent = text;
  }

  // ─── REPORT ───────────────────────────────────────────────────
  function renderReport() {
    const body = document.getElementById('report-body');
    const hasSome = sessionData.some(d => d.total > 0);

    if (!hasSome) {
      body.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <p>Belum ada data diisi.<br>Pergi ke tab Input Harian dulu.</p>
      </div>`;
      return;
    }

    let totLeads = 0, totLevels = [0,0,0,0,0], intentTot = 0, daysWithData = 0;
    sessionData.forEach(d => {
      if (!d.total) return;
      daysWithData++; totLeads += d.total;
      d.levels.forEach((v, j) => totLevels[j] += v);
      intentTot += d.levels[3] + d.levels[4];
    });

    const intentPct = totLeads > 0 ? (intentTot / totLeads * 100).toFixed(1) : 0;
    const highIdx = totLevels.indexOf(Math.max(...totLevels));

    const cards = sessionData.map((d, i) => {
      if (!d.total) return `
        <div class="day-summary-card dsc-empty">
          <div class="dsc-head"><div class="dsc-day">Hari ${i+1}</div></div>
          <div class="dsc-total">Tiada data</div>
        </div>`;

      const lvRows = LEVELS.map((lv, j) => {
        const pct = (d.levels[j] / d.total * 100);
        return `<div class="dsc-lv">
          <div class="dsc-lv-dot" style="background:${lv.color}"></div>
          <div class="dsc-lv-name">${lv.name}</div>
          <div class="dsc-lv-bar"><div class="dsc-lv-fill" style="width:${Math.min(pct,100)}%;background:${lv.color}"></div></div>
          <div class="dsc-lv-pct">${pct.toFixed(1)}%</div>
        </div>`;
      }).join('');

      return `<div class="day-summary-card">
        <div class="dsc-head">
          <div><div class="dsc-day">Hari ${i+1}</div><div class="dsc-staff">${d.staff}</div></div>
          <div style="text-align:right"><div class="dsc-total">${d.total}</div><div class="dsc-sub">leads</div></div>
        </div>
        <div class="dsc-levels">${lvRows}</div>
      </div>`;
    }).join('');

    const l1pctAvg = totLeads > 0 ? (totLevels[0] / totLeads * 100) : 0;
    let cls = 'amber', atitle = '', abody = '';
    if (l1pctAvg >= 40) {
      cls = 'red'; atitle = 'Tren 5 hari: Perlu baiki iklan';
      abody = `Purata ${l1pctAvg.toFixed(0)}% leads berhenti di Status (L1) — masalah ada pada targeting iklan, bukan skrip WA.`;
    } else if (+intentPct >= 25) {
      cls = 'green'; atitle = 'Buying intent konsisten — bagus!';
      abody = `Purata ${intentPct}% leads menunjukkan minat beli sepanjang ${daysWithData} hari. Teruskan strategi semasa.`;
    } else {
      cls = 'amber'; atitle = `Level ${highIdx+1} (${LEVELS[highIdx].name}) paling banyak drop`;
      abody = `Fokus perbaiki skrip atau content di Level ${highIdx+1} untuk tingkatkan conversion.`;
    }

    body.innerHTML = `
      <div class="section">
        <div class="summary-strip">
          <div class="ss-title">Ringkasan ${daysWithData} hari</div>
          <div class="big-metric-row">
            <div class="big-metric"><div class="bm-lbl">Total leads</div><div class="bm-val">${totLeads}</div><div class="bm-sub">${daysWithData} hari data</div></div>
            <div class="big-metric"><div class="bm-lbl">Buying intent</div><div class="bm-val" style="color:var(--green)">${intentTot}</div><div class="bm-sub">${intentPct}% dari leads</div></div>
          </div>
          <div class="action-panel ${cls}">
            <div class="ap-title">${atitle}</div>
            <div class="ap-body">${abody}</div>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-label">Breakdown setiap hari</div>
        ${cards}
      </div>`;
  }

  // ─── EXPORT CSV ───────────────────────────────────────────────
  function exportCSV() {
    const rows = [['Hari','Tarikh','Staff','Total Leads','L1 Status','L1 %','L2 Problem','L2 %','L3 Testimoni','L3 %','L4 FAQ','L4 %','L5 Harga','L5 %','Buying Intent','Intent %']];
    sessionData.forEach((d, i) => {
      const pcts = d.levels.map(v => d.total > 0 ? (v / d.total * 100).toFixed(1) + '%' : '0%');
      const intent = d.levels[3] + d.levels[4];
      const iP = d.total > 0 ? (intent / d.total * 100).toFixed(1) + '%' : '0%';
      rows.push([`Hari ${i+1}`, d.total > 0 ? new Date().toLocaleDateString('ms-MY') : '', d.staff, d.total,
        ...d.levels.flatMap((v, j) => [v, pcts[j]]), intent, iP]);
    });
    const csv = rows.map(r => r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8'}));
    a.download = `wa_leads_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
  }

  // ─── TOAST ────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ─── INIT ─────────────────────────────────────────────────────
  buildDayStrip();
  buildLevels();
  recalc();
</script>
</body>
</html>
